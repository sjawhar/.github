name: Build opencode

on:
  workflow_call:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  BUN_VERSION: "1.3.10"

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      timestamp: ${{ steps.version.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
      - uses: sjawhar/.github/.github/actions/sami-version@v1
        id: version
        with:
          source: bun
          manifest_path: packages/opencode/package.json

  build-frontend:
    name: Build frontend
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - run: bun run build
        working-directory: packages/app
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/app/dist/

  deploy-frontend:
    name: Deploy frontend to GitHub Pages
    needs: [version, build-frontend]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Prepare versioned deployment
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          mkdir -p pages-root/${TAG}
          cp -r frontend-dist/* pages-root/${TAG}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-root

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  build-cli:
    name: Build CLI
    needs: [version, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install

      - name: Patch frontend URL
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          FRONTEND_URL="https://sjawhar.github.io/opencode/${TAG}/"
          sed -i "s|https://app.opencode.ai|${FRONTEND_URL}|g" packages/opencode/src/server/server.ts
          echo "Patched default frontend URL to: ${FRONTEND_URL}"
          grep -n "sjawhar.github.io" packages/opencode/src/server/server.ts || echo "WARNING: sed replacement may not have matched"

      - name: Build CLI binaries
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}-sami.${{ needs.version.outputs.timestamp }}
          OPENCODE_CHANNEL: sami
        run: bun run script/build.ts
        working-directory: packages/opencode

      - name: Package binaries
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          cd packages/opencode/dist
          for dir in opencode-*/; do
            name="${dir%/}"
            tar czf "${name}-${TAG}.tar.gz" -C "${dir}bin" .
          done
          ls -la *.tar.gz
          mv *.tar.gz ../../../

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencode-cli
          path: "*.tar.gz"

  release:
    name: Create release
    needs: [version, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: opencode-cli
          path: artifacts

      - uses: sjawhar/.github/.github/actions/sami-release@v1
        with:
          tag: ${{ needs.version.outputs.tag }}
          files: artifacts/*
