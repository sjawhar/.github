name: Sami Release
description: Create a GitHub Release and upload assets

inputs:
  tag:
    description: 'Release tag (from sami-version)'
    required: true
  files:
    description: 'Glob pattern for files to upload (empty for tag-only release)'
    required: false
    default: ''
  body:
    description: 'Release body text'
    required: false
    default: ''
  prerelease:
    description: 'Mark as pre-release'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Determine release body
      id: body
      shell: bash
      run: |
        if [ -n "${{ inputs.body }}" ]; then
          echo "text<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ inputs.body }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        else
          echo "text<<EOF" >> "$GITHUB_OUTPUT"
          echo "Automated build from the sami branch." >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "Commit: ${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        fi

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: "sami build ${{ inputs.tag }}"
        body: ${{ steps.body.outputs.text }}
        files: ${{ inputs.files }}
        prerelease: ${{ inputs.prerelease }}
