name: Sami Release
description: Create a GitHub Release and upload assets

inputs:
  tag:
    description: 'Release tag (from sami-version)'
    required: true
  files:
    description: 'Glob pattern for files to upload (empty for tag-only release)'
    required: false
    default: ''
  body:
    description: 'Release body text'
    required: false
    default: ''
  prerelease:
    description: 'Mark as pre-release'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: "sami build ${{ inputs.tag }}"
        body: ${{ inputs.body || format('Automated build from the sami branch.\n\nCommit: {0}', github.sha) }}
        files: ${{ inputs.files }}
        prerelease: ${{ inputs.prerelease }}
